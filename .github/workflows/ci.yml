name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Code2Viz.sln

      - name: Build
        run: dotnet build Code2Viz.sln -c Release --no-restore

      - name: Test
        run: dotnet test Tests/Code2Viz.Tests.csproj -c Release --no-build
